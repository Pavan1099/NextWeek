<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>nextWEEK — Article</title>
<link rel="stylesheet" href="/css/shared.css">
<style>
.art-wrap{display:grid;grid-template-columns:1fr 290px;gap:52px;padding:40px 0;border-top:3px solid var(--pink);}
.kicker{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--pink);font-weight:700;margin-bottom:10px;}
.headline{font-family:'Playfair Display',serif;font-size:clamp(26px,4vw,50px);font-weight:900;line-height:1.08;letter-spacing:-.02em;margin-bottom:14px;}
.byline-row{display:flex;align-items:center;gap:14px;padding:13px 0;border-top:1px solid var(--rule);border-bottom:1px solid var(--rule);margin-bottom:26px;}
.avatar{width:44px;height:44px;background:var(--pink);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-weight:900;font-size:17px;color:#fff;flex-shrink:0;}
.art-body{font-size:16px;line-height:1.85;color:var(--charcoal);}
.art-body p{margin-bottom:20px;text-align:justify;hyphens:auto;}
.art-body p:first-of-type::first-letter{font-family:'Playfair Display',serif;font-size:72px;font-weight:900;float:left;line-height:.82;margin:8px 12px -4px 0;color:var(--pink);}
.pull-quote{border-top:2px solid var(--pink);border-bottom:2px solid var(--pink);padding:16px 0;margin:28px 0;font-family:'Playfair Display',serif;font-style:italic;font-size:20px;line-height:1.4;color:var(--pink-deep);text-align:center;background:var(--pink-soft);}
.aside-box{border:1px solid var(--border);border-top:3px solid var(--pink);padding:18px;margin-bottom:20px;background:var(--surface);}
.aside-box h4{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--pink);margin-bottom:10px;padding-bottom:6px;border-bottom:1px dashed var(--rule);}
.aside-box ul{list-style:none;font-size:12px;line-height:1.85;color:var(--charcoal);}
.aside-box ul li::before{content:'◆ ';color:var(--pink);font-size:8px;}
.share-box{background:var(--ink);padding:18px;margin-bottom:20px;border-top:3px solid var(--pink);}
.share-label{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--pink);margin-bottom:10px;}
.sbtn{padding:7px 12px;border:none;cursor:pointer;font-family:'Space Mono',monospace;font-size:10px;transition:opacity .2s;margin-right:6px;margin-bottom:6px;}
.sbtn:hover{opacity:.8;}
.rel-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--rule);border:1px solid var(--rule);}
.rel-card{background:var(--surface);padding:16px;cursor:pointer;transition:background .2s;}
.rel-card:hover{background:var(--pink-soft);}
.rel-thumb{height:100px;background:var(--bg2);margin-bottom:10px;display:flex;align-items:center;justify-content:center;font-size:32px;overflow:hidden;}
.rel-thumb img{width:100%;height:100%;object-fit:cover;}
@media(max-width:900px){.art-wrap{grid-template-columns:1fr;gap:28px;}.rel-grid{grid-template-columns:1fr 1fr;}}
@media(max-width:600px){.rel-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div id="mh"></div>
<div class="page-wrap">
  <div id="artM"><div class="loading" style="margin-top:60px;"></div></div>
  <div id="relM"></div>
  <div id="nl" class="reveal"></div>
</div>
<div id="ft"></div>
<script src="/js/api.js"></script>
<script>
NW.initTheme();
document.getElementById('mh').innerHTML = NW.renderMasthead();
document.getElementById('ft').innerHTML = NW.renderFooter();
document.getElementById('nl').innerHTML = NW.renderNewsletter();
NW.initTicker();
document.getElementById('themeToggleBtn').textContent = NW.getTheme()==='dark'?'☀️':'🌙';

const id = new URLSearchParams(location.search).get('id');

async function load() {
  if(!id){show404();return;}
  try {
    const art = await NW.fetchArticle(id);
    document.title = `${art.title} — nextWEEK`;
    const ini = (art.author||'A').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    const em  = NW.EMOJIS[art.section]||'📰';
    const paras = (art.body||'').split(/\n\n+/).filter(Boolean);
    let body='';
    paras.forEach((p,i)=>{
      if(i===3&&paras.length>5){const s=p.split(/[.!?]/)[0];if(s&&s.length>40)body+=`<div class="pull-quote">"${s.trim()}."</div>`;}
      body+=`<p>${p.replace(/\n/g,'<br>')}</p>`;
    });
    const img = art.imageUrl
      ? `<img src="${art.imageUrl}" alt="${art.title}" style="width:100%;max-height:420px;object-fit:cover;border:1px solid var(--border);margin-bottom:26px;display:block;">`
      : `<div style="width:100%;height:280px;background:linear-gradient(135deg,#3d1a5e,#a855c8);display:flex;align-items:center;justify-content:center;font-size:80px;margin-bottom:26px;">${em}</div>`;
    const tagsH = (art.tags||[]).map(t=>`<a class="tag" href="${NW.sectionURL(art.section)}">${t}</a>`).join('');

    document.getElementById('artM').innerHTML=`
      <div class="art-wrap reveal">
        <article>
          <div class="kicker">${art.section} &nbsp;·&nbsp; ${NW.readTime(art.body)}</div>
          <h1 class="headline">${art.title}</h1>
          <div class="byline-row">
            <div class="avatar">${ini}</div>
            <div>
              <div style="font-family:'Space Mono',monospace;font-size:12px;font-weight:700;">${art.author}</div>
              <div style="font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);">${NW.formatDate(art.dateISO)} &nbsp;·&nbsp; ${NW.readTime(art.body)}</div>
            </div>
          </div>
          ${img}
          <div class="art-body">${body}</div>
          <div class="tags" style="margin-top:26px;">${tagsH}</div>
        </article>
        <aside>
          <div class="aside-box">
            <h4>About This Piece</h4>
            <ul>
              <li>Section: ${art.section}</li>
              <li>Author: ${art.author}</li>
              <li>Published: ${NW.formatDate(art.dateISO)}</li>
              <li>Read time: ${NW.readTime(art.body)}</li>
              ${art.tags?.length?`<li>Tags: ${art.tags.join(', ')}</li>`:''}
            </ul>
          </div>
          <div class="share-box">
            <div class="share-label">Share This</div>
            <button class="sbtn" style="background:var(--pink);color:#fff;" onclick="share('twitter')">X / Twitter</button>
            <button class="sbtn" style="background:#25d366;color:#fff;" onclick="share('wa')">WhatsApp</button>
            <button class="sbtn" style="background:var(--bg2);color:var(--ink);" onclick="share('copy')">Copy Link</button>
          </div>
          <div class="aside-box">
            <h4>More from ${art.section}</h4>
            <div id="moreSame"><div class="loading"></div></div>
          </div>
        </aside>
      </div>`;

    const same = (await NW.fetchArticles(art.section)).filter(a=>a.id!==id).slice(0,3);
    document.getElementById('moreSame').innerHTML = same.length
      ? same.map(a=>`<div style="padding:9px 0;border-bottom:1px dashed var(--rule);cursor:pointer;" onclick="location.href='${NW.articleURL(a.id)}'">
          <div style="font-family:'Space Mono',monospace;font-size:9px;color:var(--pink);">${NW.formatDate(a.dateISO)}</div>
          <div style="font-family:'Playfair Display',serif;font-weight:700;font-size:13px;line-height:1.3;">${a.title}</div>
        </div>`).join('')
      : '<p style="font-size:12px;color:var(--muted);">No other articles in this section yet.</p>';

    const others=(await NW.fetchArticles()).filter(a=>a.id!==id).slice(0,3);
    if(others.length) document.getElementById('relM').innerHTML=`
      <div style="padding:28px 0;border-top:2px solid var(--pink);" class="reveal">
        <div class="section-rule"><h2>More to Read</h2></div>
        <div class="rel-grid">${others.map(a=>{
          const th=a.imageUrl?`<div class="rel-thumb"><img src="${a.imageUrl}" alt=""></div>`:`<div class="rel-thumb">${NW.EMOJIS[a.section]||'📰'}</div>`;
          return `<div class="rel-card" onclick="location.href='${NW.articleURL(a.id)}'">${th}<div class="card-cat">${a.section}</div><div style="font-family:'Playfair Display',serif;font-weight:700;font-size:14px;line-height:1.3;">${a.title}</div></div>`;
        }).join('')}</div>
      </div>`;
    NW.initReveal();
  } catch(e){show404(e.message);}
}
function show404(m=''){
  document.getElementById('artM').innerHTML=`<div style="text-align:center;padding:120px 20px;">
    <div style="font-family:'Playfair Display',serif;font-size:72px;font-weight:900;color:var(--pink);">404</div>
    <p style="font-family:'Playfair Display',serif;font-style:italic;font-size:18px;margin:14px 0;">${m||'Article not found.'}</p>
    <a href="/" style="font-family:'Space Mono',monospace;font-size:12px;color:var(--pink);">← Back to Home</a>
  </div>`;
}
function share(p){const u=location.href,t=document.title;if(p==='twitter')window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(t)}&url=${encodeURIComponent(u)}`);else if(p==='wa')window.open(`https://wa.me/?text=${encodeURIComponent(t+' '+u)}`);else{navigator.clipboard?.writeText(u);alert('Copied!');}}
load();
</script>
</body>
</html>
