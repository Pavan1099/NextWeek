<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>nextWEEK — Opinions that bite back</title>
<link rel="stylesheet" href="/css/shared.css">
<style>
.home-grid{display:grid;grid-template-columns:1fr 320px;gap:0;padding:32px 0;border-bottom:2px solid var(--pink);}
.home-main{padding-right:36px;border-right:1px solid var(--rule);}
.home-sidebar{padding-left:28px;}
.sidebar-label{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:#fff;background:var(--pink);display:inline-block;padding:4px 10px;margin-bottom:14px;}
.cards-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--rule);border:1px solid var(--rule);margin-bottom:32px;}
.cg-card{background:var(--surface);padding:18px;cursor:pointer;transition:background .2s;border-top:3px solid transparent;}
.cg-card:hover{background:var(--bg2);border-top-color:var(--pink);}
.section-strip{display:flex;overflow-x:auto;gap:1px;background:var(--rule);border:1px solid var(--rule);margin-bottom:32px;}
.section-pill{flex:1;min-width:120px;background:var(--surface);padding:16px 12px;text-align:center;cursor:pointer;text-decoration:none;color:var(--ink);transition:background .2s,color .2s;}
.section-pill:hover{background:var(--pink);color:#fff;}
.section-pill:hover .pill-count{color:rgba(255,255,255,.75);}
.pill-emoji{font-size:24px;display:block;margin-bottom:5px;}
.pill-name{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;}
.pill-count{font-size:11px;color:var(--muted);margin-top:2px;}
@media(max-width:900px){.home-grid{grid-template-columns:1fr;}.home-main{padding-right:0;border-right:none;border-bottom:1px solid var(--rule);padding-bottom:24px;margin-bottom:24px;}.home-sidebar{padding-left:0;}.cards-grid{grid-template-columns:1fr 1fr;}}
@media(max-width:600px){.cards-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div id="mh"></div>
<div class="page-wrap">
  <div class="home-grid reveal">
    <div class="home-main" id="hero"><div class="loading"></div></div>
    <aside class="home-sidebar">
      <div class="sidebar-label">Latest Stories</div>
      <div id="rail"><div class="loading"></div></div>
    </aside>
  </div>
  <div class="section-rule reveal"><h2>Browse By Section</h2></div>
  <div class="section-strip reveal" id="sstrip"><div class="loading"></div></div>
  <div class="section-rule reveal"><h2>Recent Opinions</h2><span class="badge">All Sections</span></div>
  <div class="cards-grid reveal" id="cgrid"><div class="loading" style="grid-column:1/-1"></div></div>
  <div id="nl" class="reveal"></div>
</div>
<div id="ft"></div>
<script src="/js/api.js"></script>
<script>
NW.initTheme();
document.getElementById('mh').innerHTML = NW.renderMasthead();
document.getElementById('ft').innerHTML = NW.renderFooter();
document.getElementById('nl').innerHTML = NW.renderNewsletter();
NW.initTicker(); NW.initReveal();

// Update theme btn after render
document.getElementById('themeToggleBtn').textContent = NW.getTheme()==='dark'?'☀️':'🌙';

async function build() {
  try {
    const [arts, sd] = await Promise.all([NW.fetchArticles(), NW.fetchSections()]);
    document.getElementById('hero').innerHTML = arts.length ? NW.renderCard(arts[0],'hero')
      : `<div class="empty-state"><h3>No articles yet</h3><p><a href="/login.html">Sign in as Publisher</a> to publish the first piece.</p></div>`;

    const rail = arts.slice(1,6);
    document.getElementById('rail').innerHTML = rail.length ? rail.map(a=>NW.renderCard(a)).join('')
      : '<p style="font-size:13px;color:var(--muted);">More coming soon.</p>';

    document.getElementById('sstrip').innerHTML = NW.SECTIONS.map(s=>{
      const c = sd.counts[s]||0;
      return `<a class="section-pill" href="${NW.sectionURL(s)}">
        <span class="pill-emoji">${NW.EMOJIS[s]||'📰'}</span>
        <span class="pill-name">${s}</span>
        <span class="pill-count">${c} article${c!==1?'s':''}</span>
      </a>`;
    }).join('');

    const recent = arts.slice(1,7);
    document.getElementById('cgrid').innerHTML = recent.length
      ? recent.map(a=>`<div class="cg-card" onclick="location.href='${NW.articleURL(a.id)}'">
          ${a.imageUrl?`<div style="height:130px;background:url('${a.imageUrl}') center/cover;border:1px solid var(--border);margin-bottom:10px;"></div>`:`<div style="height:130px;background:linear-gradient(135deg,#3d1a5e,#a855c8);display:flex;align-items:center;justify-content:center;font-size:40px;margin-bottom:10px;">${NW.EMOJIS[a.section]||'📰'}</div>`}
          <div class="card-cat">${a.section}</div>
          <div style="font-family:'Playfair Display',serif;font-weight:700;font-size:15px;line-height:1.3;margin:5px 0 6px;">${a.title}</div>
          <div class="card-meta"><span class="card-author">${a.author}</span> &nbsp;·&nbsp; ${NW.formatDate(a.dateISO)}</div>
        </div>`).join('')
      : `<div class="empty-state" style="grid-column:1/-1"><h3>More soon</h3></div>`;
  } catch(e) {
    document.getElementById('hero').innerHTML=`<div class="empty-state"><h3>Error</h3><p>${e.message}</p></div>`;
  }
}
build();
</script>
</body>
</html>
